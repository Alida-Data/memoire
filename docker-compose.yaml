version: '3.8'

services:
  # Base de données PostgreSQL pour le pipeline, Airflow et MLflow
  postgres:
    image: postgres:15
    container_name: postgres_memoire
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=memoire
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_v5:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      pipeline_network:
        aliases:
          - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d memoire"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 
  
  #  MLflow Server : Version corrigée avec variables d'environnement Gunicorn
  # 🚀 MLflow Server : Configuration standard et stable
  mlflow_server:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow_server_memoire
    environment:
      - MLFLOW_HTTP_PROXY_ALLOW_ALL=True
    #  CORRECTION : On isole sqlite dans /mlruns/metadata et les graphiques/modèles dans /mlruns/artifacts
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:////mlruns/metadata/mlflow.db --default-artifact-root /mlruns/artifacts
    volumes:
      - mlflow_data:/mlruns
    networks:
      - pipeline_network
      

  # 🛡️ MLflow Proxy (Nginx) : La version finale par montage de fichier (sans crash Windows)
  mlflow_proxy:
    image: nginx:alpine
    container_name: mlflow_proxy_memoire
    ports:
      - "5000:5000"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - mlflow_server
    networks:
      - pipeline_network
  # Microservice 1 : Extraction
  extract-service:
    build: { context: ., dockerfile: Dockerfile.extract }
    container_name: extract_microservice
    tty: true
    ports: ["8001:8000"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/memoire
      - KAGGLE_USERNAME=sopiealidandin
      - KAGGLE_KEY=KGAT_126cf48b86c24cb9f22c64b91b49c054
    volumes: [shared_data:/data]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      pipeline_network:
        aliases:
          - extract-service

  # 
  transform-service:
    build:
      context: .
      dockerfile: Dockerfile.transform
    container_name: transform_microservice
    tty: true
    ports:
      - "8002:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/memoire
      #  On cible le proxy qui va corriger l'en-tête à la volée !
      - MLFLOW_TRACKING_URI=http://mlflow_proxy:5000
    volumes:
      - shared_data:/data
      - mlflow_data:/mlruns
    depends_on:
      - postgres
      - mlflow_proxy
    networks:
      pipeline_network:
        aliases:
          - transform-service
  # Microservice 3 : Chargement
  load-service:
    build: { context: ., dockerfile: Dockerfile.load }
    container_name: load_microservice
    tty: true
    ports: ["8003:8000"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/memoire
    volumes: [shared_data:/data]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      pipeline_network:
        aliases:
          - load-service

  # Initialiser la base de données d'Airflow au démarrage
  airflow-init:
    image: apache/airflow:2.7.3-python3.10
    container_name: airflow_init_memoire
    command: db init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/memoire
      # Ajout des variables de secours pour brider la consommation de RAM :
      - AIRFLOW__WEBSERVER__WORKERS=1
      - AIRFLOW__SCHEDULER__PARALLELISM=2
      - AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG=1
    networks:
      - pipeline_network
  # Orchestrateur Airflow - Interface Web
  # Orchestrateur Airflow - Interface Web
  # Orchestrateur Airflow - Interface Web
  airflow-webserver:
    image: apache/airflow:2.7.3-python3.10
    container_name: airflow_webserver_memoire
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports: ["8082:8080"]
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/memoire
      - AIRFLOW__WEBSERVER__SECRET_KEY=cle_secrete_pour_le_memoire_miage_12345
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
      - _AIRFLOW_WWW_USER_FIRSTNAME=Alida
      - _AIRFLOW_WWW_USER_LASTNAME=MIAGE
      - _AIRFLOW_WWW_USER_EMAIL=alida@example.com
      - _AIRFLOW_WWW_USER_ROLE=Admin
      - AIRFLOW_CONN_HTTP_EXTRACT=http://extract-service:8000
      - AIRFLOW_CONN_HTTP_TRANSFORM=http://transform-service:8000
      - AIRFLOW_CONN_HTTP_LOAD=http://load-service:8000
    networks:
      - pipeline_network

  # Le Planificateur Airflow
  airflow-scheduler:
    image: apache/airflow:2.7.3-python3.10
    container_name: airflow_scheduler_memoire
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/memoire
      - AIRFLOW__WEBSERVER__SECRET_KEY=cle_secrete_pour_le_memoire_miage_12345
      - AIRFLOW_CONN_HTTP_EXTRACT=http://extract-service:8000
      - AIRFLOW_CONN_HTTP_TRANSFORM=http://transform-service:8000
      - AIRFLOW_CONN_HTTP_LOAD=http://load-service:8000
      - AIRFLOW__WEBSERVER__WORKERS=1
      - AIRFLOW__SCHEDULER__PARALLELISM=2
      - AIRFLOW__CORE__MAX_ACTIVE_RUNS_PER_DAG=1
    networks:
      - pipeline_network
volumes:
  postgres_data_v5:
  shared_data:
  mlflow_data:

networks:
  pipeline_network:
    driver: bridge